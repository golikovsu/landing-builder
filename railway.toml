[build]
builder = "NIXPACKS"
buildCommand = "pnpm install --frozen-lockfile && pnpm --filter @landing/shared build && pnpm --filter @landing/api exec prisma generate && pnpm --filter @landing/api build"

[deploy]
startCommand = "pnpm --filter @landing/api db:migrate:prod && pnpm --filter @landing/api start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
